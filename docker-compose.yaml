version: "3.8"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exchange
    ports:
      - "5432:5432"
    
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U postgres -d exchange"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5

  app:
    build: .
    depends_on:
      - db
        #condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}